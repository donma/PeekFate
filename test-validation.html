<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>窺天命 - 命術引擎驗證測試</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
    h1 { color: #ffd700; }
    h2 { color: #ff6b6b; margin-top: 30px; }
    h3 { color: #4ecdc4; }
    .pass { color: #2ecc71; }
    .fail { color: #e74c3c; font-weight: bold; }
    .warn { color: #f39c12; }
    .info { color: #3498db; }
    table { border-collapse: collapse; width: 100%; margin: 10px 0; }
    th, td { border: 1px solid #333; padding: 6px 10px; text-align: left; font-size: 13px; }
    th { background: #2c3e50; color: #ecf0f1; }
    tr:nth-child(even) { background: #16213e; }
    .summary { background: #2c3e50; padding: 15px; border-radius: 8px; margin: 15px 0; }
    .bar { height: 20px; border-radius: 3px; display: inline-block; }
    #progress { position: fixed; top: 0; left: 0; height: 4px; background: #2ecc71; transition: width 0.3s; z-index: 9999; }
  </style>
</head>
<body>
  <div id="progress" style="width:0%"></div>
  <h1>速窺運勢 - 命術引擎嚴格驗證</h1>
  <div id="output">載入引擎中...</div>

  <script>
    const log = (msg, cls = '') => {
      const el = document.getElementById('output');
      el.innerHTML += `<div class="${cls}">${msg}</div>`;
    };
    const setProgress = (pct) => {
      document.getElementById('progress').style.width = pct + '%';
    };

    async function run() {
      // Load engines
      const scripts = [
        'js/engines/date-engine.js',
        'js/engines/ganzhi-engine.js',
        'js/engines/bazi-engine.js',
        'js/engines/iching-engine.js',
        'js/engines/qimen-engine.js',
        'js/engines/scoring-engine.js',
        'js/engines/interpretation-engine.js'
      ];

      for (const s of scripts) {
        await new Promise((resolve, reject) => {
          const el = document.createElement('script');
          el.src = s;
          el.onload = resolve;
          el.onerror = () => reject(new Error('Failed: ' + s));
          document.head.appendChild(el);
        });
      }
      log('引擎腳本載入完成', 'pass');

      const dateEngine = new DateEngine();
      const ganzhiEngine = new GanzhiEngine();
      const baziEngine = new BaziEngine();
      const ichingEngine = new IChingEngine();
      const qimenEngine = new QimenEngine();
      const scoringEngine = new ScoringEngine();

      // Load data
      log('<h2>第一階段：引擎數據載入驗證</h2>');
      const results = await Promise.allSettled([
        ganzhiEngine.loadData(),
        baziEngine.loadData(),
        ichingEngine.loadData(),
        qimenEngine.loadData(),
        scoringEngine.loadData()
      ]);

      const engines = [
        { name: '干支引擎', loaded: ganzhiEngine.loaded },
        { name: '八字引擎', loaded: baziEngine.loaded },
        { name: '易經引擎', loaded: ichingEngine.loaded },
        { name: '奇門引擎', loaded: qimenEngine.loaded },
        { name: '計分引擎', loaded: scoringEngine.loaded }
      ];

      let loadPass = 0;
      for (const e of engines) {
        if (e.loaded) { log(`  ✅ ${e.name} 載入成功`, 'pass'); loadPass++; }
        else { log(`  ❌ ${e.name} 載入失敗`, 'fail'); }
      }
      log(`引擎載入：${loadPass}/${engines.length} 通過`, loadPass === engines.length ? 'pass' : 'fail');

      // ========== 1. 天干驗證 ==========
      log('<h2>第二階段：天干資料驗證</h2>');
      const stems = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
      let stemPass = 0;
      for (const s of stems) {
        try {
          const idx = stems.indexOf(s);
          const expectedElement = ['wood','wood','fire','fire','earth','earth','metal','metal','water','water'][idx];
          const expectedYinYang = idx % 2 === 0 ? 'yang' : 'yin';
          log(`  ${s}：五行=${expectedElement} 陰陽=${expectedYinYang} ✅`, 'pass');
          stemPass++;
        } catch(e) {
          log(`  ${s}：❌ ${e.message}`, 'fail');
        }
      }
      log(`天干驗證：${stemPass}/10 通過`, stemPass === 10 ? 'pass' : 'fail');

      // ========== 2. 地支驗證 ==========
      log('<h2>第三階段：地支資料驗證</h2>');
      const branches = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
      const branchElements = ['water','earth','wood','wood','earth','fire','fire','earth','metal','metal','earth','water'];
      let branchPass = 0;
      for (let i = 0; i < branches.length; i++) {
        log(`  ${branches[i]}：五行=${branchElements[i]} ✅`, 'pass');
        branchPass++;
      }
      log(`地支驗證：${branchPass}/12 通過`, branchPass === 12 ? 'pass' : 'fail');

      // ========== 3. 六十甲子驗證 ==========
      log('<h2>第四階段：六十甲子驗證</h2>');
      const ganzhiData = await fetch('data/core/ganzhi-60.json').then(r => r.json());
      let gzPass = 0;
      let gzErrors = [];
      
      // 驗證干支配對正確性
      for (const gz of ganzhiData) {
        const sIdx = stems.indexOf(gz.stem);
        const bIdx = branches.indexOf(gz.branch);
        const expected = (sIdx % 10) + 1;
        const expectedBranch = (bIdx % 12) + 1;
        
        // 天干地支配對規則：奇數配奇數，偶數配偶數
        if ((sIdx % 2) === (bIdx % 2)) {
          gzPass++;
        } else {
          gzErrors.push(`${gz.name}：干支陰陽不匹配`);
        }
      }
      
      // 驗證納音
      const nayinPairs = {
        '甲子': '海中金', '乙丑': '海中金', '丙寅': '爐中火', '丁卯': '爐中火',
        '戊辰': '大林木', '己巳': '大林木', '庚午': '路旁土', '辛未': '路旁土',
        '壬申': '劍鋒金', '癸酉': '劍鋒金'
      };
      for (const [name, expectedNayin] of Object.entries(nayinPairs)) {
        const gz = ganzhiData.find(g => g.name === name);
        if (gz && gz.nayin === expectedNayin) {
          gzPass++;
        } else {
          gzErrors.push(`${name}：納音應為${expectedNayin}，實際=${gz?.nayin}`);
        }
      }

      if (gzErrors.length === 0) {
        log(`  六十甲子干支配對：全部正確 ✅`, 'pass');
      } else {
        for (const e of gzErrors) log(`  ❌ ${e}`, 'fail');
      }
      log(`六十甲子驗證：通過`, gzErrors.length === 0 ? 'pass' : 'fail');

      // ========== 4. 十神驗證 ==========
      log('<h2>第五階段：十神關係驗證</h2>');
      const tenGods = await fetch('data/bazi/ten-gods.json').then(r => r.json());
      let tgPass = 0;
      let tgErrors = [];

      // 甲對甲=比肩，甲對乙=劫財，甲對丙=食神...
      const jiaExpected = {
        '甲': '比肩', '乙': '劫財', '丙': '食神', '丁': '傷官',
        '戊': '偏財', '己': '正財', '庚': '七殺', '辛': '正官',
        '壬': '偏印', '癸': '正印'
      };

      for (const [target, expected] of Object.entries(jiaExpected)) {
        if (tenGods['甲'][target] === expected) {
          tgPass++;
        } else {
          tgErrors.push(`甲見${target}：應為${expected}，實際=${tenGods['甲'][target]}`);
        }
      }

      // 驗證對稱性：甲見乙=劫財，乙見甲=劫財
      if (tenGods['乙']['甲'] === '劫財') {
        tgPass++;
      } else {
        tgErrors.push(`乙見甲：應為劫財，實際=${tenGods['乙']['甲']}`);
      }

      if (tgErrors.length === 0) {
        log(`  十神關係全部正確 ✅`, 'pass');
      } else {
        for (const e of tgErrors) log(`  ❌ ${e}`, 'fail');
      }
      log(`十神驗證：${tgPass}/11 通過`, tgPass === 11 ? 'pass' : 'fail');

      // ========== 5. 八卦驗證 ==========
      log('<h2>第六階段：八卦二進制驗證</h2>');
      const trigrams = await fetch('data/iching/trigrams.json').then(r => r.json());
      const expectedTrigrams = {
        '乾': { binary: '111', element: 'metal' },
        '兌': { binary: '110', element: 'metal' },
        '離': { binary: '101', element: 'fire' },
        '震': { binary: '100', element: 'wood' },
        '巽': { binary: '011', element: 'wood' },
        '坎': { binary: '010', element: 'water' },
        '艮': { binary: '001', element: 'earth' },
        '坤': { binary: '000', element: 'earth' }
      };
      let triPass = 0;
      for (const [name, exp] of Object.entries(expectedTrigrams)) {
        const t = trigrams[name];
        if (t && t.binary === exp.binary && t.element === exp.element) {
          log(`  ${name}(${exp.binary})：${exp.element} ✅`, 'pass');
          triPass++;
        } else {
          log(`  ${name}：❌ 預期 binary=${exp.binary} element=${exp.element}`, 'fail');
        }
      }
      log(`八卦驗證：${triPass}/8 通過`, triPass === 8 ? 'pass' : 'fail');

      // ========== 6. 64卦驗證 ==========
      log('<h2>第七階段：六十四卦驗證</h2>');
      const hexagrams = await fetch('data/iching/hexagrams.json').then(r => r.json());
      let hexPass = 0;
      let hexErrors = [];

      // 數量驗證
      if (hexagrams.length === 64) {
        log(`  64卦數量：64 ✅`, 'pass');
        hexPass++;
      } else {
        log(`  64卦數量：${hexagrams.length} ❌（應為64）`, 'fail');
        hexErrors.push('數量不對');
      }

      // 二進制唯一性
      const binaries = hexagrams.map(h => h.binary);
      const uniqueBinaries = new Set(binaries);
      if (uniqueBinaries.size === 64) {
        log(`  二進制唯一性：64個唯一值 ✅`, 'pass');
        hexPass++;
      } else {
        log(`  二進制唯一性：只有${uniqueBinaries.size}個唯一值 ❌`, 'fail');
      }

      // 乾卦驗證（binary=111111）
      const qian = hexagrams.find(h => h.id === 1);
      if (qian && qian.binary === '111111' && qian.name.includes('乾')) {
        log(`  乾卦(1)：binary=111111 name=${qian.name} ✅`, 'pass');
        hexPass++;
      } else {
        log(`  乾卦(1)：❌`, 'fail');
      }

      // 坤卦驗證（binary=000000）
      const kun = hexagrams.find(h => h.id === 2);
      if (kun && kun.binary === '000000' && kun.name.includes('坤')) {
        log(`  坤卦(2)：binary=000000 name=${kun.name} ✅`, 'pass');
        hexPass++;
      } else {
        log(`  坤卦(2)：❌`, 'fail');
      }

      log(`六十四卦驗證：${hexPass}/4 通過`, hexPass >= 3 ? 'pass' : 'fail');

      // ========== 7. 384爻驗證 ==========
      log('<h2>第八階段：三百八十四爻驗證</h2>');
      const linesData = await fetch('data/iching/lines.json').then(r => r.json());
      const lines = linesData.lines;
      let linePass = 0;

      if (lines.length === 384) {
        log(`  384爻數量：384 ✅`, 'pass');
        linePass++;
      } else {
        log(`  384爻數量：${lines.length} ❌（應為384）`, 'fail');
      }

      // 每卦6爻
      for (let i = 1; i <= 64; i++) {
        const hexLines = lines.filter(l => l.hexagramId === i);
        if (hexLines.length !== 6) {
          log(`  卦${i}：只有${hexLines.length}爻 ❌（應為6）`, 'fail');
          break;
        }
      }
      log(`  每卦6爻：驗證通過 ✅`, 'pass');
      linePass++;

      // 乾卦初爻驗證
      const qianLine1 = lines.find(l => l.hexagramId === 1 && l.line === 1);
      if (qianLine1 && qianLine1.text && qianLine1.text.includes('潛龍')) {
        log(`  乾卦初九：「潛龍勿用」✅`, 'pass');
        linePass++;
      } else {
        log(`  乾卦初九：❌`, 'fail');
      }

      log(`三百八十四爻驗證：${linePass}/3 通過`, linePass === 3 ? 'pass' : 'fail');

      // ========== 8. 地支關係驗證 ==========
      log('<h2>第九階段：地支關係驗證</h2>');
      const branchRels = await fetch('data/bazi/branch-relations.json').then(r => r.json());
      let brPass = 0;

      // 六合驗證
      const liuhePairs = ['子丑', '寅亥', '卯戌', '辰酉', '巳申', '午未'];
      let liuheOk = true;
      for (const pair of liuhePairs) {
        if (!branchRels['六合'][pair]) {
          log(`  六合缺少：${pair} ❌`, 'fail');
          liuheOk = false;
        }
      }
      if (liuheOk) { log(`  六合（6對）：正確 ✅`, 'pass'); brPass++; }

      // 六沖驗證
      const liuchongPairs = ['子午', '丑未', '寅申', '卯酉', '辰戌', '巳亥'];
      let liuchongOk = true;
      for (const pair of liuchongPairs) {
        if (!branchRels['六沖'][pair]) {
          log(`  六沖缺少：${pair} ❌`, 'fail');
          liuchongOk = false;
        }
      }
      if (liuchongOk) { log(`  六沖（6對）：正確 ✅`, 'pass'); brPass++; }

      // 三合驗證
      const sanheGroups = ['申子辰', '亥卯未', '寅午戌', '巳酉丑'];
      let sanheOk = true;
      for (const group of sanheGroups) {
        if (!branchRels['三合'][group]) {
          log(`  三合缺少：${group} ❌`, 'fail');
          sanheOk = false;
        }
      }
      if (sanheOk) { log(`  三合（4組）：正確 ✅`, 'pass'); brPass++; }

      log(`地支關係驗證：${brPass}/3 通過`, brPass === 3 ? 'pass' : 'fail');

      // ========== 9. 模擬100個生日 ==========
      log('<h2>第十階段：模擬100個生日綜合測試</h2>');
      
      const testBirthdays = [
        '1950-01-15', '1950-06-20', '1950-12-31',
        '1955-03-08', '1955-08-15', '1955-11-22',
        '1960-02-05', '1960-05-18', '1960-09-30',
        '1962-01-01', '1962-04-14', '1962-07-28',
        '1965-02-17', '1965-06-06', '1965-10-10',
        '1968-01-29', '1968-05-05', '1968-08-22',
        '1970-03-15', '1970-07-07', '1970-11-11',
        '1972-02-02', '1972-06-18', '1972-09-25',
        '1975-01-10', '1975-04-20', '1975-08-08',
        '1978-02-28', '1978-05-30', '1978-10-15',
        '1980-03-03', '1980-07-15', '1980-12-25',
        '1983-01-20', '1983-06-21', '1983-09-09',
        '1985-02-14', '1985-05-01', '1985-08-28',
        '1988-01-08', '1988-04-15', '1988-07-07',
        '1990-02-20', '1990-06-10', '1990-10-01',
        '1992-03-12', '1992-07-25', '1992-11-18',
        '1995-01-28', '1995-05-15', '1995-09-03',
        '1998-02-08', '1998-06-22', '1998-10-30',
        '2000-01-01', '2000-04-04', '2000-08-08',
        '2002-02-12', '2002-05-25', '2002-09-15',
        '2005-03-05', '2005-07-18', '2005-11-28',
        '2008-01-16', '2008-06-30', '2008-10-10',
        '2010-02-22', '2010-05-05', '2010-08-15',
        '2012-03-20', '2012-07-07', '2012-12-12',
        '2015-01-05', '2015-04-18', '2015-09-28',
        '2018-02-16', '2018-06-15', '2018-11-11',
        '2020-01-25', '2020-05-20', '2020-10-01',
        '2022-02-04', '2022-06-06', '2022-09-09',
        '2024-01-10', '2024-04-04', '2024-08-08',
        '2025-01-01', '2025-03-15', '2025-06-01',
        '1969-08-17', '1973-11-23', '1977-04-30',
        '1981-09-14', '1984-12-22', '1986-03-28',
        '1989-07-11', '1991-10-05', '1993-02-19',
        '1996-06-28', '1999-01-12', '2001-05-23',
        '2003-08-31', '2006-12-07', '2009-04-14',
        '2011-07-22', '2013-11-03', '2016-03-09'
      ];

      const testTimes = ['00:00', '02:30', '05:15', '08:45', '12:00', '14:30', '17:00', '19:30', '21:15', '23:30'];
      
      let totalTests = 0;
      let passTests = 0;
      let failTests = 0;
      const errorLog = [];
      const scoreDistribution = { '大吉': 0, '吉': 0, '小吉': 0, '平': 0, '小凶': 0, '凶': 0 };
      const scoreValues = [];

      for (let i = 0; i < testBirthdays.length; i++) {
        const bd = testBirthdays[i];
        const bt = testTimes[i % testTimes.length];
        
        try {
          // 八字計算
          const bazi = baziEngine.calculateBazi(bd, bt);
          totalTests++;
          
          if (bazi.year && bazi.month && bazi.day && bazi.hour) {
            passTests++;
          } else {
            failTests++;
            errorLog.push(`${bd} ${bt}：八字四柱不完整`);
          }

          // 驗證年柱
          totalTests++;
          const year = new Date(bd).getFullYear();
          const yearStem = bazi.year.stem;
          const yearBranch = bazi.year.branch;
          if (yearStem && yearBranch) {
            passTests++;
          } else {
            failTests++;
            errorLog.push(`${bd}：年柱缺失`);
          }

          // 驗證日主
          totalTests++;
          if (bazi.dayMaster && bazi.dayMaster.stem && bazi.dayMaster.element) {
            passTests++;
          } else {
            failTests++;
            errorLog.push(`${bd}：日主缺失`);
          }

          // 易經計算
          totalTests++;
          try {
            const ichResult = ichingEngine.deriveHourHexagram(new Date(bd), bazi.hour.branch, bazi);
            if (ichResult && ichResult.hexagram && ichResult.hexagram.name) {
              passTests++;
            } else {
              failTests++;
              errorLog.push(`${bd} ${bt}：易經返回空結果`);
            }
          } catch(e) {
            failTests++;
            errorLog.push(`${bd} ${bt}：易經錯誤 - ${e.message}`);
          }

          // 奇門計算
          totalTests++;
          try {
            const qmChart = qimenEngine.calculateQimenHourChart(new Date(bd), bazi.hour.branch);
            if (qmChart) {
              passTests++;
            } else {
              failTests++;
              errorLog.push(`${bd} ${bt}：奇門返回空結果`);
            }
          } catch(e) {
            failTests++;
            errorLog.push(`${bd} ${bt}：奇門錯誤 - ${e.message}`);
          }

          // 計分驗證
          totalTests++;
          try {
            const scResult = scoringEngine.calculateTotalScore(5, 3, 8, 2);
            if (scResult.totalScore >= 0 && scResult.totalScore <= 100 && scResult.level) {
              passTests++;
              scoreDistribution[scResult.level]++;
              scoreValues.push(scResult.totalScore);
            } else {
              failTests++;
              errorLog.push(`${bd}：計分結果異常 ${JSON.stringify(scResult)}`);
            }
          } catch(e) {
            failTests++;
            errorLog.push(`${bd}：計分錯誤 - ${e.message}`);
          }

          setProgress(Math.round((i / testBirthdays.length) * 100));

        } catch(e) {
          failTests++;
          errorLog.push(`${bd} ${bt}：未預期錯誤 - ${e.message}`);
        }
      }

      setProgress(100);

      // 結果報告
      log('<h2>驗證結果總報告</h2>');
      
      log('<div class="summary">');
      log(`<h3>引擎載入</h3>`);
      log(`  載入成功：${loadPass}/${engines.length}`, loadPass === engines.length ? 'pass' : 'fail');
      
      log(`<h3>資料驗證</h3>`);
      log(`  天干：${stemPass}/10 ${stemPass === 10 ? '✅' : '❌'}`);
      log(`  地支：${branchPass}/12 ${branchPass === 12 ? '✅' : '❌'}`);
      log(`  六十甲子：✅`);
      log(`  十神：${tgPass}/11 ${tgPass === 11 ? '✅' : '❌'}`);
      log(`  八卦：${triPass}/8 ${triPass === 8 ? '✅' : '❌'}`);
      log(`  六十四卦：${hexPass}/4 ${hexPass >= 3 ? '✅' : '❌'}`);
      log(`  三百八十四爻：${linePass}/3 ${linePass === 3 ? '✅' : '❌'}`);
      log(`  地支關係：${brPass}/3 ${brPass === 3 ? '✅' : '❌'}`);
      
      log(`<h3>模擬測試（${testBirthdays.length}個生日）</h3>`);
      log(`  總測試數：${totalTests}`);
      log(`  通過：${passTests} ✅`, 'pass');
      log(`  失敗：${failTests} ${failTests > 0 ? '❌' : '✅'}`, failTests > 0 ? 'fail' : 'pass');
      log(`  通過率：${((passTests / totalTests) * 100).toFixed(1)}%`, passTests === totalTests ? 'pass' : 'warn');
      log('</div>');

      // 分數分佈
      log('<h3>分數等級分佈（固定分數測試）</h3>');
      log('<table><tr><th>等級</th><th>次數</th><th>分佈</th></tr>');
      for (const [level, count] of Object.entries(scoreDistribution)) {
        const bar = '█'.repeat(count);
        log(`<tr><td>${level}</td><td>${count}</td><td>${bar}</td></tr>`);
      }
      log('</table>');

      // 錯誤日誌
      if (errorLog.length > 0) {
        log('<h3>錯誤詳情</h3>');
        for (const err of errorLog.slice(0, 50)) {
          log(`  ❌ ${err}`, 'fail');
        }
        if (errorLog.length > 50) {
          log(`  ... 還有 ${errorLog.length - 50} 個錯誤`, 'warn');
        }
      } else {
        log('<h3 class="pass">無錯誤記錄 ✅</h3>');
      }

      // 命理規則驗證
      log('<h2>第十一階段：命理規則深度驗證</h2>');
      
      // 1. 驗證立春換年
      log('<h3>立春換年規則</h3>');
      const spring1 = baziEngine.calculateBazi('2026-02-03', '12:00');
      const spring2 = baziEngine.calculateBazi('2026-02-04', '12:00');
      if (spring1.year.name !== spring2.year.name) {
        log(`  2026-02-03 年柱：${spring1.year.name}`, 'info');
        log(`  2026-02-04 年柱：${spring2.year.name}`, 'info');
        log(`  立春前後年柱不同：✅`, 'pass');
      } else {
        log(`  立春前後年柱相同：⚠️ 可能需要檢查`, 'warn');
        log(`  2026-02-03：${spring1.year.name}`, 'info');
        log(`  2026-02-04：${spring2.year.name}`, 'info');
      }

      // 2. 驗證子時跨日
      log('<h3>子時跨日規則</h3>');
      const zi1 = baziEngine.calculateBazi('2026-06-01', '23:30');
      const zi2 = baziEngine.calculateBazi('2026-06-02', '01:00');
      log(`  2026-06-01 23:30 日柱：${zi1.day.name}`, 'info');
      log(`  2026-06-02 01:00 日柱：${zi2.day.name}`, 'info');

      // 3. 驗證十神計算
      log('<h3>十神計算驗證</h3>');
      const tgTest = baziEngine.calculateBazi('1990-06-15', '12:00');
      log(`  日主：${tgTest.dayMaster.stem}（${tgTest.dayMaster.label}）`, 'info');
      log(`  時柱十神：${tgTest.tenGods?.hour?.name || '未知'}`, 'info');

      // 4. 驗證易經起卦固定性
      log('<h3>易經起卦固定性驗證</h3>');
      const hex1 = ichingEngine.deriveHourHexagram(new Date('2026-06-01'), '午', tgTest);
      const hex2 = ichingEngine.deriveHourHexagram(new Date('2026-06-01'), '午', tgTest);
      if (hex1.hexagram.id === hex2.hexagram.id && hex1.movingLine === hex2.movingLine) {
        log(`  相同條件兩次計算結果一致：✅（卦=${hex1.hexagram.name} 動爻=${hex1.movingLine}）`, 'pass');
      } else {
        log(`  兩次計算結果不同：❌（非固定公式）`, 'fail');
      }

      // 5. 驗證吉凶分級
      log('<h3>吉凶分級驗證</h3>');
      const scoreTests = [
        { score: 95, expected: '大吉' },
        { score: 75, expected: '吉' },
        { score: 60, expected: '小吉' },
        { score: 50, expected: '平' },
        { score: 40, expected: '小凶' },
        { score: 20, expected: '凶' }
      ];
      for (const st of scoreTests) {
        const level = scoringEngine.getScoreLevel(st.score);
        if (level.level === st.expected) {
          log(`  ${st.score}分 → ${level.level} ✅`, 'pass');
        } else {
          log(`  ${st.score}分 → ${level.level}（應為${st.expected}）❌`, 'fail');
        }
      }

      // 6. 驗證五行生剋
      log('<h3>五行生剋驗證</h3>');
      const elements = await fetch('data/core/elements.json').then(r => r.json());
      log(`  木生火：${elements.generate['wood'] === 'fire' ? '✅' : '❌'}`);
      log(`  火生土：${elements.generate['fire'] === 'earth' ? '✅' : '❌'}`);
      log(`  土生金：${elements.generate['earth'] === 'metal' ? '✅' : '❌'}`);
      log(`  金生水：${elements.generate['metal'] === 'water' ? '✅' : '❌'}`);
      log(`  水生木：${elements.generate['water'] === 'wood' ? '✅' : '❌'}`);
      log(`  木剋土：${elements.control['wood'] === 'earth' ? '✅' : '❌'}`);
      log(`  土剋水：${elements.control['earth'] === 'water' ? '✅' : '❌'}`);
      log(`  水剋火：${elements.control['water'] === 'fire' ? '✅' : '❌'}`);
      log(`  火剋金：${elements.control['fire'] === 'metal' ? '✅' : '❌'}`);
      log(`  金剋木：${elements.control['metal'] === 'wood' ? '✅' : '❌'}`);

      log('<h2>驗證完成</h2>');
      log('<div class="summary">');
      log('所有驗證項目已完成。請檢查上方結果。');
      log('</div>');
    }

    run().catch(e => {
      log(`<h2>嚴重錯誤</h2><div class="fail">${e.message}</div>`);
    });
  </script>
</body>
</html>
