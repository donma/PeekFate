  <meta name="twitter:description" content="純前端命術規則引擎 PWA，結合八字、易經與奇門遁甲，每日時辰精算，掌握運勢先機。不儲存個資，可離線使用。">

  <!-- JSON-LD 結構化資料 -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "速窺運勢",
    "description": "純前端命術規則引擎，結合八字、易經與奇門遁甲，每日時辰推演運勢。",
    "applicationCategory": "LifestyleApplication",
    "operatingSystem": "All",
    "browserRequirements": "Requires JavaScript",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "TWD"
    },
    "author": {
      "@type": "Organization",
      "name": "當麻實驗室",
      "url": "https://donmalab.com"
    }
  }

</head>
<body>
  <div class="page-wrapper">
    <!-- 頂部導航 -->
    <header class="header">
      <div class="container header-inner">
        <div class="logo">
          <img src="icons/icon-192.png" alt="速窺運勢" class="logo-img">
          <span>速窺運勢</span>
        </div>
      </div>
    </header>

    <!-- 錯誤顯示區域 -->
    <div id="engineError" class="engine-error" style="display:none;"></div>

    <!-- 主要內容 -->
    <main class="main-content">
      <div class="container">
        <!-- 首頁表單區塊 -->
        <section class="hero-section">
          <div class="section-header">
            <div class="hero-badge">純前端命術規則引擎</div>
            <h1 class="hero-title">速窺運勢</h1>
            <div class="hero-divider"></div>
            <p class="hero-subtitle">八字 × 易經 × 奇門遁甲</p>
            <p class="hero-desc">每日時辰精算，掌握運勢先機</p>
          </div>
        </section>

        <!-- 輸入區塊（首頁獨立顯示，提交後移入結果區） -->
        <section class="input-section" id="inputSection" style="display:none">
          <div class="form-container" id="formContainer">
            <form id="birthForm" class="birth-form">
              <div class="form-group">
                <label for="birthDate" class="form-label">
                  西元生日 <span class="required">*</span>
                </label>
                <input 
                  type="date" 
                  id="birthDate" 
                  name="birthDate" 
                  class="form-input"
                  required
                >
              </div>

              <div class="form-group">
                <label class="form-label">
                  性別
                </label>
                <div class="gender-group">
                  <label class="gender-label">
                    <input type="radio" name="gender" value="male" class="gender-radio">
                    <span class="gender-custom">男</span>
                  </label>
                  <label class="gender-label">
                    <input type="radio" name="gender" value="female" class="gender-radio">
                    <span class="gender-custom">女</span>
                  </label>
                </div>
              </div>

              <div class="form-group">
                <label for="birthHour" class="form-label">
                   出生時辰
                </label>
                <select id="birthHour" name="birthHour" class="form-select">
                  <option value="">-- 請選擇時辰 --</option>
                  <option value="zi">子時 (23:00-01:00)</option>
                  <option value="chou">丑時 (01:00-03:00)</option>
                  <option value="yin">寅時 (03:00-05:00)</option>
                  <option value="mao">卯時 (05:00-07:00)</option>
                  <option value="chen">辰時 (07:00-09:00)</option>
                  <option value="si">巳時 (09:00-11:00)</option>
                  <option value="wu">午時 (11:00-13:00)</option>
                  <option value="wei">未時 (13:00-15:00)</option>
                  <option value="shen">申時 (15:00-17:00)</option>
                  <option value="you">酉時 (17:00-19:00)</option>
                  <option value="xu">戌時 (19:00-21:00)</option>
                  <option value="hai">亥時 (21:00-23:00)</option>
                </select>
                <span class="form-hint">選填，若不確定精確時間可選擇時辰</span>
              </div>

              <div class="form-group">
                <label for="birthTime" class="form-label">
                   出生時間 <span class="hint-light">(除非 23:00~01:00，否則用時辰即可)</span>
                </label>
                <input 
                  type="time" 
                  id="birthTime" 
                  name="birthTime" 
                  class="form-input"
                  placeholder="HH:mm"
                >
              </div>

              <div class="form-group form-group-checkbox">
                <label class="checkbox-label">
                  <input type="checkbox" id="unknownTime" name="unknownTime" class="form-checkbox">
                  <span class="checkbox-custom"></span>
                  不知道出生時間
                </label>
              </div>

              <div class="form-group" id="eventCategoryGroup" style="display:none">
                <label for="eventCategory" class="form-label">
                  推算類別
                </label>
                <select id="eventCategory" name="eventCategory" class="form-select">
                  <option value="general" selected>綜合運勢</option>
                  <option value="career">事業運勢</option>
                  <option value="wealth">財運走勢</option>
                  <option value="love">感情運勢</option>
                  <option value="creative">創作運勢</option>
                </select>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnStart">
                  儲存並推算
                </button>
                <button type="button" class="btn btn-secondary btn-block" id="btnClear">
                  清除資料
                </button>
              </div>
            </form>
          </div>
        </section>

        <!-- 結果區塊 -->
        <section class="result-page" id="resultSection" style="display: none;">
          <div id="resultContent">
            <!-- 結果將由 JavaScript 動態填充 -->
          </div>
        </section>
      </div>
    </main>

    <!-- 底部 -->
    <footer class="footer" id="about">
      <div class="container">
        <div class="disclaimer">
          <p>免責聲明：本工具依傳統命術規則推算，內容屬民俗文化與個人參考，不作為醫療、法律、投資、婚姻或人生重大決策保證。</p>
        </div>
        <div class="copyright">
          <p>&copy; 2026 速窺運勢 - 純前端命術規則引擎 | <a href="verification-report.html" target="_blank" rel="noopener noreferrer">監測報告</a> | <a href="https://donmalab.com" target="_blank" rel="noopener noreferrer">當麻實驗室</a></p>
        </div>
      </div>
    </footer>
  </div>

  <!-- 安裝提示 -->
  <div class="install-prompt" id="installPrompt" style="display: none;">
    <button class="install-btn" id="installBtn">安裝到桌面</button>
    <button class="install-close" id="installClose">×</button>
  </div>

  <!-- 載入進度條 -->
  <div class="loading-progress" id="loadingProgress"></div>

  <script>
    function toggleSection() {
      var container = document.getElementById('formContainer');
      var btn = document.getElementById('btnToggleForm');
      if (!container) return;
      var isCollapsed = container.classList.contains('collapsed');
      container.classList.toggle('collapsed');
      if (btn) btn.textContent = isCollapsed ? '▲ 收合輸入區' : '▼ 修改資料';
    }

    function toggleBazi() {
      var body = document.getElementById('baziBody');
      var btn = document.getElementById('baziToggleBtn');
      if (body && btn) {
        var isCollapsed = body.classList.contains('collapsed');
        body.classList.toggle('collapsed');
        btn.textContent = isCollapsed ? '▲ 個人基本盤' : '▼ 個人基本盤';
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      var formContainer = document.getElementById('formContainer');
      var btnToggle = document.getElementById('btnToggleForm');
      if (btnToggle && formContainer) {
        btnToggle.addEventListener('click', toggleSection);
      }
    });
  </script>

  <script src="js/performance-monitor.js"></script>
  <script src="js/app-optimized.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
