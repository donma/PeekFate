<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>速窺運勢 - 八字 × 易經 × 奇門遁甲，每日時辰推演工具</title>
  <meta name="description" content="純前端命術規則引擎 PWA，不儲存個資，可離線使用">
  <meta name="theme-color" content="#F7EFE1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="速窺運勢">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- 頂部導航 -->
    <header class="header">
      <div class="container header-inner">
        <div class="logo">
          <img src="icons/icon-192.png" alt="速窺運勢" class="logo-img">
          <span>速窺運勢</span>
        </div>
      </div>
    </header>

    <!-- 錯誤顯示區域 -->
    <div id="engineError" class="engine-error" style="display:none;"></div>

    <!-- 主要內容 -->
    <main class="main-content">
      <div class="container">
        <!-- 首頁表單區塊 -->
        <section class="hero-section">
          <div class="section-header">
            <div class="hero-badge">純前端命術規則引擎</div>
            <h1 class="hero-title">速窺運勢</h1>
            <div class="hero-divider"></div>
            <p class="hero-subtitle">八字 × 易經 × 奇門遁甲</p>
            <p class="hero-desc">每日時辰精算，掌握運勢先機</p>
            <button type="button" class="btn-toggle-section" id="btnToggleSection" onclick="toggleSection()">
              ▼ 修改資料
            </button>
          </div>
          
          <div class="form-container collapsed" id="formContainer">
            <form id="birthForm" class="birth-form">
              <div class="form-group">
                <label for="birthDate" class="form-label">
                  西元生日 <span class="required">*</span>
                </label>
                <input 
                  type="date" 
                  id="birthDate" 
                  name="birthDate" 
                  class="form-input"
                  required
                >
              </div>

              <div class="form-group">
                <label for="birthTime" class="form-label">
                  出生時間
                </label>
                <input 
                  type="time" 
                  id="birthTime" 
                  name="birthTime" 
                  class="form-input"
                  placeholder="HH:mm"
                >
                <span class="form-hint">選填，如已知請填寫以獲得更精確的推算</span>
              </div>

              <div class="form-group">
                <label for="birthHour" class="form-label">
                  出生時辰
                </label>
                <select id="birthHour" name="birthHour" class="form-select">
                  <option value="">-- 請選擇時辰 --</option>
                  <option value="zi">子時 (23:00-01:00)</option>
                  <option value="chou">丑時 (01:00-03:00)</option>
                  <option value="yin">寅時 (03:00-05:00)</option>
                  <option value="mao">卯時 (05:00-07:00)</option>
                  <option value="chen">辰時 (07:00-09:00)</option>
                  <option value="si">巳時 (09:00-11:00)</option>
                  <option value="wu">午時 (11:00-13:00)</option>
                  <option value="wei">未時 (13:00-15:00)</option>
                  <option value="shen">申時 (15:00-17:00)</option>
                  <option value="you">酉時 (17:00-19:00)</option>
                  <option value="xu">戌時 (19:00-21:00)</option>
                  <option value="hai">亥時 (21:00-23:00)</option>
                </select>
                <span class="form-hint">選填，若不確定精確時間可選擇時辰</span>
              </div>

              <div class="form-group form-group-checkbox">
                <label class="checkbox-label">
                  <input type="checkbox" id="unknownTime" name="unknownTime" class="form-checkbox">
                  <span class="checkbox-custom"></span>
                  不知道出生時間
                </label>
              </div>

              <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnStart">
                  儲存並推算
                </button>
                <button type="button" class="btn btn-secondary btn-block" id="btnClear">
                  清除資料
                </button>
              </div>
            </form>
          </div>
        </section>

        <!-- 結果區塊 -->
        <section class="result-page" id="resultSection" style="display: none;">
          <div id="resultContent">
            <!-- 結果將由 JavaScript 動態填充 -->
          </div>
        </section>
      </div>
    </main>

    <!-- 底部 -->
    <footer class="footer" id="about">
      <div class="container">
        <div class="disclaimer">
          <p>免責聲明：本工具依傳統命術規則推算，內容屬民俗文化與個人參考，不作為醫療、法律、投資、婚姻或人生重大決策保證。</p>
        </div>
        <div class="copyright">
          <p>&copy; 2026 速窺運勢 - 純前端命術規則引擎 | <a href="https://donmalab.com" target="_blank" rel="noopener noreferrer">當麻實驗室</a></p>
        </div>
      </div>
    </footer>
  </div>

  <!-- 安裝提示 -->
  <div class="install-prompt" id="installPrompt" style="display: none;">
    <button class="install-btn" id="installBtn">安裝到桌面</button>
    <button class="install-close" id="installClose">×</button>
  </div>

  <!-- 載入進度條 -->
  <div class="loading-progress" id="loadingProgress"></div>

  <script>
    function toggleSection() {
      var btn = document.getElementById('btnToggleSection');
      var container = document.getElementById('formContainer');
      if (btn && container) {
        var isCollapsed = container.classList.contains('collapsed');
        container.classList.toggle('collapsed');
        btn.textContent = isCollapsed ? '▲ 收合輸入區' : '▼ 修改資料';
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      var btnToggle = document.getElementById('btnToggleSection');
      var formContainer = document.getElementById('formContainer');
      if (btnToggle && formContainer) {
        btnToggle.addEventListener('click', toggleSection);
      }
    });
  </script>

  <script src="js/performance-monitor.js"></script>
  <script src="js/app-optimized.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
