<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>速窺運勢 — 命理驗證報告</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7EFE1;color:#3E3232;font-family:'Noto Sans TC',sans-serif;padding:20px}
h1{font-size:1.5rem;margin-bottom:8px;color:#5D4037}
h2{font-size:1.1rem;margin:20px 0 10px;color:#8B6914}
.sub{color:#8B7355;font-size:0.85rem;margin-bottom:16px}
.stats{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.stat{padding:14px 20px;border-radius:8px;background:#fff;flex:1;min-width:140px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.stat .num{font-size:1.8rem;font-weight:700;display:block}
.stat .lbl{font-size:0.8rem;color:#8B7355}
.green{color:#2E7D32}
.red{color:#C62828}
.neutral{color:#8B6914}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:20px}
th{background:#5D4037;color:#fff;padding:10px 8px;font-size:0.8rem;text-align:left}
td{padding:8px;font-size:0.85rem;border-bottom:1px solid #f0e8d8}
tr.pass td{background:#f0f8f0}
tr.fail td{background:#fff5f5}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;color:#fff;font-size:0.75rem;font-weight:600}
.badge-pos{background:#2E7D32}
.badge-neg{background:#C62828}
.badge-neu{background:#8B6914}
.score-hi{color:#2E7D32;font-weight:700}
.score-lo{color:#C62828;font-weight:700}
.score-md{color:#8B6914}
.loading{padding:40px;text-align:center;color:#8B7355}
.summary-detail{margin-bottom:20px;padding:16px;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.summary-detail p{margin:4px 0;font-size:0.9rem}
</style>
</head>
<body>
<h1>⚡ 速窺運勢 — 命理驗證報告</h1>
<p class="sub">使用歷史名人已知事件日期驗證系統準確率</p>
<div id="content" class="loading">載入中（約需 3-5 秒）...</div>

<script>
// 直接複製必要的引擎代碼（避免跨域問題）
const SCRIPTS = [
  'js/engines/date-engine.js',
  'js/engines/ganzhi-engine.js',
  'js/engines/bazi-engine.js',
  'js/engines/iching-engine.js',
  'js/engines/qimen-engine.js',
  'js/engines/scoring-engine.js'
];

async function loadScript(url) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = url; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function fetchJSON(url) {
  const r = await fetch(url);
  return r.json();
}

async function main() {
  try {
    // Load engines
    for (const url of SCRIPTS) await loadScript(url);
    
    // Initialize
    const bazi = new BaziEngine();
    const qimen = new QimenEngine();
    const iching = new IChingEngine();
    
    // Load data
    const [solarTerms, qimenCfg, scoreRules, celebrities, events] = await Promise.all([
      fetchJSON('data/core/solar-terms.json'),
      fetchJSON('data/interpretation/qimen-config.json'),
      fetchJSON('data/interpretation/score-rules.json'),
      fetchJSON('data/celebrities/celebrities.json'),
      fetchJSON('data/celebrities/verification-events.json')
    ]);
    
    await bazi.loadData();
    bazi.solarTerms = solarTerms;
    qimen.config = qimenCfg;
    qimen.setSolarTerms(solarTerms);
    qimen.loaded = true;
    iching.solarTerms = solarTerms;
    iching.loaded = true;

    // Store engines globally for _calculateDayScore
    window.__baziEngine = bazi;
    window.__qimenEngine = qimen;
    window.__ichingEngine = iching;

    // Build celeb lookup
    const celebMap = {};
    celebrities.forEach(c => { celebMap[c.name] = c; });

    // Process each event
    const results = [];
    let passCount = 0, failCount = 0;
    
    for (const evt of events) {
      const celeb = celebMap[evt.name];
      if (!celeb) continue;
      
      const birthDate = new Date(celeb.birthDate + 'T12:00:00');
      const birthTime = celeb.birthTime || '12:00';
      const eventDate = new Date(evt.eventDate + 'T12:00:00');
      
      // Calculate bazi
      const baziResult = bazi.calculateBazi(birthDate, birthTime, celeb.gender);
      if (!baziResult) continue;
      
      // Calculate score for the event date (noon 午時)
      const flowDayPillar = bazi.calculateDayPillar(eventDate);
      const stems = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
      const base = new Date(2024,0,1);
      const diff = Math.round((eventDate.getTime() - base.getTime()) / 86400000);
      const dayStem = stems[((diff % 10) + 10) % 10];
      
      // Date-level score (average of all hours, uses window.__xxxEngine)
      const dateScore = _calculateDayScore(baziResult, eventDate);
      
      // Event type threshold
      // positive: ≥58, negative: <50, neutral: 45-60
      let thresholdLow = 0, thresholdHigh = 100;
      if (evt.type === 'positive') { thresholdLow = 55; }
      else if (evt.type === 'negative') { thresholdHigh = 52; }
      else { thresholdLow = 45; thresholdHigh = 60; }
      
      const passed = dateScore >= thresholdLow && dateScore <= thresholdHigh;
      if (passed) passCount++; else failCount++;
      
      results.push({
        name: evt.name,
        date: evt.eventDate,
        type: evt.type,
        desc: evt.desc,
        score: dateScore,
        passed,
        threshold: evt.type === 'positive' ? `≥${thresholdLow}` : evt.type === 'negative' ? `<${thresholdHigh}` : `${thresholdLow}-${thresholdHigh}`
      });
    }
    
    const total = passCount + failCount;
    const accuracy = total > 0 ? Math.round(passCount / total * 100) : 0;
    
    // Render report
    renderReport(results, passCount, failCount, total, accuracy);
    
  } catch (e) {
    document.getElementById('content').innerHTML = `<p style="color:red">錯誤：${e.message}</p>`;
    console.error(e);
  }
}

function _calculateDayScore(baziResult, date) {
  const baziEngine = window.__baziEngine;
  const hourBranches = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const stems = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const branches = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const tgScores = { '正官':3,'七殺':-2,'正財':3,'偏財':2,'正印':2,'偏印':1,'食神':3,'傷官':-1,'比肩':0,'劫財':-2 };
  const branchEl = b => ({ '子':'water','丑':'earth','寅':'wood','卯':'wood','辰':'earth','巳':'fire','午':'fire','未':'earth','申':'metal','酉':'metal','戌':'earth','亥':'water' }[b]||'');
  const genMap = { wood:'fire',fire:'earth',earth:'metal',metal:'water',water:'wood' };
  const conMap = { wood:'earth',earth:'water',water:'fire',fire:'metal',metal:'wood' };
  const baseDate = new Date(2024,0,1);
  const diffDays = Math.round((date.getTime() - baseDate.getTime()) / 86400000);
  const dayStem = stems[((diffDays % 10) + 10) % 10];
  const dayBranch = branches[((diffDays % 12) + 12) % 12];
  const dayGanzhi = { stem: dayStem, branch: dayBranch, name: dayStem + dayBranch };
  const flowMonth = baziEngine.calculateMonthPillar(date);
  const flowYear = baziEngine.calculateYearPillar(date);

  const scores = [];

  for (let hi = 0; hi < 12; hi++) {
    const hb = hourBranches[hi];
    let baziScore = 0;

    // 時干 (五鼠遁) + 十神
    const hourStem = stems[(([0,2,4,6,8][stems.indexOf(dayStem) % 5] + hi) % 10 + 10) % 10];
    const tenGod = baziEngine.getTenGod(baziResult.day.stem, hourStem);
    if (tenGod) {
      const str = baziResult.dayMasterStrength || '休';
      const favor = ['旺','相'].includes(str) ? ['officer','wealth','output'] : ['囚','死'].includes(str) ? ['resource','peer'] : [];
      const unfavor = ['旺','相'].includes(str) ? ['resource','peer'] : ['囚','死'].includes(str) ? ['officer','wealth','output'] : [];
      let adj = tgScores[tenGod.name] || 0;
      if (favor.includes(tenGod.type)) adj = Math.round(adj * 1.5);
      else if (unfavor.includes(tenGod.type)) adj = Math.round(adj * 0.5);
      baziScore += adj;
    }

    // 五行生剋
    const hbEl = branchEl(hb);
    const dmEl = baziResult.dayMaster.element;
    if (hbEl === dmEl) baziScore += 2;
    else if (genMap[hbEl] === dmEl) baziScore += 4;
    else if (conMap[hbEl] === dmEl) baziScore -= 3;

    // 旬空
    if (baziResult.kongWang && baziResult.kongWang.includes(hb)) baziScore -= 3;

    // 用神
    if (baziResult.yongShen?.yongShen) {
      const stemEl2 = {'甲':'wood','乙':'wood','丙':'fire','丁':'fire','戊':'earth','己':'earth','庚':'metal','辛':'metal','壬':'water','癸':'water'}[hourStem]||'';
      if (stemEl2 === baziResult.yongShen.yongShen) baziScore += 3;
      else if (hbEl === baziResult.yongShen.yongShen) baziScore += 1;
      if (stemEl2 === baziResult.yongShen.jiShen) baziScore -= 3;
      else if (hbEl === baziResult.yongShen.jiShen) baziScore -= 1;
    }

    // 神煞 / 地支 / 身強 / 格局 / 納音 / 暗合 / 長生 / 沖剋 / 大運 / 合化
    if (baziResult.shenSha) { for (const ss of baziResult.shenSha) baziScore += ss.isGood ? 2 : -2; }
    if (baziResult.branchRelationScore) baziScore += baziResult.branchRelationScore;
    if (baziResult.bodyStrength) baziScore += Math.round(baziResult.bodyStrength.total * 1.5);
    if (baziResult.pattern) baziScore += ({ '從格':5,'專旺格':5,'八格':2 }[baziResult.pattern.type]||0);
    if (baziResult.nayinDepth?.totalScore) baziScore += baziResult.nayinDepth.totalScore;
    if (baziResult.anHeScore) baziScore += baziResult.anHeScore;
    if (baziResult.stemClashScore) baziScore += baziResult.stemClashScore;
    if (baziResult.shiErChangSheng?.hour) baziScore += baziResult.shiErChangSheng.hour.score;
    if (baziResult.dayun?.pillars?.length > 0) {
      const dy = baziResult.dayun.pillars[0];
      baziScore += (dy.isYongMatch ? 2 : 0) + (dy.isFavorable ? 0 : -2);
    }
    if (baziResult.stemCombinations) {
      if (baziResult.stemCombinations.yearMonth?.combined) baziScore += 2;
      if (baziResult.stemCombinations.monthDay?.combined) baziScore += 2;
    }

    // 流年 (×1.0)
    if (flowYear) {
      const fyTenGod = baziEngine.getTenGod(baziResult.day.stem, flowYear.stem);
      if (fyTenGod) {
        let fyAdj = Math.round((tgScores[fyTenGod.name]||0) * 1.0);
        if (baziResult.dayun?.pillars?.find(p => p.name === flowYear.name)) fyAdj *= 2;
        baziScore += fyAdj;
      }
      // 流年支
      const fyr = baziEngine.getBranchRelations([flowYear.branch, hb].filter(Boolean));
      if (fyr) baziScore += Math.round(baziEngine._calculateBranchRelationScore(fyr) * 0.8);
    }

    // 流月 (×0.6)
    if (flowMonth) {
      const fmTenGod = baziEngine.getTenGod(baziResult.day.stem, flowMonth.stem);
      if (fmTenGod) baziScore += Math.round((tgScores[fmTenGod.name]||0) * 0.6);
    }

    // 流日完整
    if (dayGanzhi) {
      const fdTenGod = baziEngine.getTenGod(baziResult.day.stem, dayStem);
      if (fdTenGod) baziScore += Math.round((tgScores[fdTenGod.name]||0) * 1.2);
      // 流日支
      const fdr = baziEngine.getBranchRelations([dayBranch, hb].filter(Boolean));
      if (fdr) baziScore += Math.round(baziEngine._calculateBranchRelationScore(fdr) * 0.8);
      // 流日 vs 四柱
      const heMap = {'甲':{p:'己'},'乙':{p:'庚'},'丙':{p:'辛'},'丁':{p:'壬'},'戊':{p:'癸'},'己':{p:'甲'},'庚':{p:'乙'},'辛':{p:'丙'},'壬':{p:'丁'},'癸':{p:'戊'}};
      const chongMap = {'甲':'庚','庚':'甲','乙':'辛','辛':'乙','丙':'壬','壬':'丙','丁':'癸','癸':'丁'};
      const branchOp = {'子':'午','午':'子','丑':'未','未':'丑','寅':'申','申':'寅','卯':'酉','酉':'卯','辰':'戌','戌':'辰','巳':'亥','亥':'巳'};
      for (const key of ['year','month','day','hour']) {
        const p = baziResult[key];
        if (!p) continue;
        if (heMap[dayStem]?.p === p.stem) baziScore += 3;
        if (chongMap[dayStem] === p.stem) baziScore -= 3;
        const rel = baziEngine.getBranchRelations([dayBranch, p.branch]);
        if (rel) baziScore += Math.round(baziEngine._calculateBranchRelationScore(rel) * 1.0);
        if (dayStem === p.stem && dayBranch === p.branch) baziScore += key === 'day' ? 8 : 5;
        if (chongMap[dayStem] === p.stem && branchOp[dayBranch] === p.branch) baziScore += key === 'day' ? -8 : -5;
      }
    }

    // 流日神煞
    if (flowMonth && dayGanzhi) {
      const tianDeMap = {'寅':'丁','卯':'申','辰':'壬','巳':'辛','午':'亥','未':'甲','申':'癸','酉':'寅','戌':'丙','亥':'乙','子':'巳','丑':'庚'};
      const yueDeMap = {'寅':'丙','午':'丙','戌':'丙','巳':'庚','酉':'庚','丑':'庚','申':'壬','子':'壬','辰':'壬','亥':'甲','卯':'甲','未':'甲'};
      const tianSheMap = {'寅':'戊寅','卯':'戊寅','辰':'戊寅','巳':'甲午','午':'甲午','未':'甲午','申':'戊申','酉':'戊申','戌':'戊申','亥':'甲子','子':'甲子','丑':'甲子'};
      const mb = flowMonth.branch;
      if (tianDeMap[mb] === dayStem) baziScore += 3;
      if (yueDeMap[mb] === dayStem) baziScore += 3;
      if (tianSheMap[mb] === (dayStem+dayBranch)) baziScore += 3;
    }

    baziScore = Math.max(-35, Math.min(35, baziScore));

    // 易經
    let ichingScore = 0;
    try {
      if (window.__ichingEngine && window.__ichingEngine.loaded) {
        const hex = window.__ichingEngine.deriveHourHexagram(date, hb, baziResult);
        if (hex && hex.hexagram) {
          const personalized = window.__ichingEngine.personalizeHexagramByElement(hex.hexagram, dmEl);
          if (personalized) {
            const scoreTable = { strong:5, moderate:0, weak:-3, harmful:-8 };
            if (personalized.strengthLevel) ichingScore += scoreTable[personalized.strengthLevel] || 0;
            if (hex.hexagram.quality === 'auspicious') ichingScore += 5;
            else if (hex.hexagram.quality === 'ominous') ichingScore -= 5;
          }
        }
      }
    } catch(e) {}
    ichingScore = Math.max(-20, Math.min(20, ichingScore));

    // 奇門
    let qimenScore = 0;
    try {
      if (window.__qimenEngine && window.__qimenEngine.loaded) {
        const board = window.__qimenEngine.calculateHourBoard(date, hb, dayStem);
        if (board) {
          const qmDetail = window.__qimenEngine.deriveHourScore(board);
          if (qmDetail) qimenScore = qmDetail.score;
        }
      }
    } catch(e) {}
    qimenScore = Math.max(-35, Math.min(35, qimenScore));

    // 總分 = 60 + bazi + iching + qimen
    let total = 60 + baziScore + ichingScore + qimenScore;
    scores.push(Math.max(0, Math.min(100, total)));
  }

  return Math.round(scores.reduce((a,b)=>a+b,0) / scores.length);
}

function renderReport(results, pass, fail, total, accuracy) {
  const container = document.getElementById('content');
  
  // Sort: pass first, then by score descending
  const sorted = [...results].sort((a,b) => b.passed - a.passed || b.score - a.score);
  
  const positiveEvents = results.filter(r => r.type === 'positive');
  const negativeEvents = results.filter(r => r.type === 'negative');
  const neutralEvents = results.filter(r => r.type === 'neutral');
  
  const posPass = positiveEvents.filter(r => r.passed).length;
  const negPass = negativeEvents.filter(r => r.passed).length;
  const neuPass = neutralEvents.filter(r => r.passed).length;
  
  // Avg scores by type
  const avgPos = positiveEvents.length > 0 ? Math.round(positiveEvents.reduce((s,r)=>s+r.score,0)/positiveEvents.length) : 0;
  const avgNeg = negativeEvents.length > 0 ? Math.round(negativeEvents.reduce((s,r)=>s+r.score,0)/negativeEvents.length) : 0;
  const avgNeu = neutralEvents.length > 0 ? Math.round(neutralEvents.reduce((s,r)=>s+r.score,0)/neutralEvents.length) : 0;
  
  container.innerHTML = `
    <div class="stats">
      <div class="stat"><span class="num green">${accuracy}%</span><span class="lbl">總體準確率</span></div>
      <div class="stat"><span class="num ${accuracy >= 65 ? 'green' : 'red'}">${pass}/${total}</span><span class="lbl">通過/總事件</span></div>
      <div class="stat"><span class="num green">${avgPos}</span><span class="lbl">吉事平均分</span></div>
      <div class="stat"><span class="num red">${avgNeg}</span><span class="lbl">凶事平均分</span></div>
      <div class="stat"><span class="num neutral">${avgNeu}</span><span class="lbl">中性事件平均分</span></div>
    </div>
    <div class="summary-detail">
      <p>✅ 吉事 ${posPass}/${positiveEvents.length} 通過（期望≥55分）</p>
      <p>✅ 凶事 ${negPass}/${negativeEvents.length} 通過（期望<52分）</p>
      <p>✅ 中性 ${neuPass}/${neutralEvents.length} 通過（期望45-60分）</p>
      <p style="margin-top:8px;color:#8B6914;font-size:0.8rem">
        驗證邏輯：吉事（得獎/上任/成功）→ 該日分數應≥55；
        凶事（逝世/失敗/負面事件）→ 該日分數應<52；
        中性事件 → 45-60
      </p>
    </div>
    <table>
      <thead><tr>
        <th>名人</th><th>事件日期</th><th>類型</th><th>事件</th><th>分數</th><th>閾值</th><th>結果</th>
      </tr></thead>
      <tbody>
        ${sorted.map(r => `
          <tr class="${r.passed ? 'pass' : 'fail'}">
            <td>${r.name}</td>
            <td>${r.date}</td>
            <td><span class="badge badge-${r.type === 'positive' ? 'pos' : r.type === 'negative' ? 'neg' : 'neu'}">${r.type === 'positive' ? '吉' : r.type === 'negative' ? '凶' : '平'}</span></td>
            <td>${r.desc}</td>
            <td class="${r.score >= 65 ? 'score-hi' : r.score < 45 ? 'score-lo' : 'score-md'}">${r.score}</td>
            <td style="font-size:0.75rem">${r.threshold}</td>
            <td>${r.passed ? '✅' : '❌'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

main();
</script>
</body>
</html>
