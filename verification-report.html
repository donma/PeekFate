<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>速窺運勢 — 命理驗證報告</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7EFE1;color:#3E3232;font-family:'Noto Sans TC',sans-serif;padding:20px}
h1{font-size:1.5rem;margin-bottom:8px;color:#5D4037}
h2{font-size:1.1rem;margin:20px 0 10px;color:#8B6914}
.sub{color:#8B7355;font-size:0.85rem;margin-bottom:16px}
.stats{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.stat{padding:14px 20px;border-radius:8px;background:#fff;flex:1;min-width:140px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.stat .num{font-size:1.8rem;font-weight:700;display:block}
.stat .lbl{font-size:0.8rem;color:#8B7355}
.green{color:#2E7D32}
.red{color:#C62828}
.neutral{color:#8B6914}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:20px}
th{background:#5D4037;color:#fff;padding:10px 8px;font-size:0.8rem;text-align:left}
td{padding:8px;font-size:0.85rem;border-bottom:1px solid #f0e8d8}
tr.pass td{background:#f0f8f0}
tr.fail td{background:#fff5f5}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;color:#fff;font-size:0.75rem;font-weight:600}
.badge-pos{background:#2E7D32}
.badge-neg{background:#C62828}
.badge-neu{background:#8B6914}
.score-hi{color:#2E7D32;font-weight:700}
.score-lo{color:#C62828;font-weight:700}
.score-md{color:#8B6914}
.loading{padding:40px;text-align:center;color:#8B7355}
.summary-detail{margin-bottom:20px;padding:16px;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.summary-detail p{margin:4px 0;font-size:0.9rem}
</style>
</head>
<body>
<h1>⚡ 速窺運勢 — 命理驗證報告 <span style="font-size:0.7rem;color:#999">v100</span></h1>
<p class="sub">使用歷史名人已知事件日期驗證系統準確率</p>
<div id="content" class="loading">載入中（約需 3-5 秒）...</div>

<script>
// 直接複製必要的引擎代碼（避免跨域問題）
const SCRIPTS = [
  'js/engines/date-engine.js',
  'js/engines/ganzhi-engine.js',
  'js/engines/bazi-engine.js',
  'js/engines/iching-engine.js',
  'js/engines/qimen-engine.js',
  'js/engines/scoring-engine.js'
];

async function loadScript(url) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = url; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function fetchJSON(url) {
  const r = await fetch(url);
  return r.json();
}

async function main() {
  try {
    // Load engines
    for (const url of SCRIPTS) await loadScript(url);
    
    // Initialize
    const bazi = new BaziEngine();
    const qimen = new QimenEngine();
    const iching = new IChingEngine();
    
    // Load data
    const [solarTerms, qimenCfg, scoreRules, celebrities, events] = await Promise.all([
      fetchJSON('data/core/solar-terms.json'),
      fetchJSON('data/interpretation/qimen-config.json'),
      fetchJSON('data/interpretation/score-rules.json'),
      fetchJSON('data/celebrities/celebrities.json'),
      fetchJSON('data/celebrities/verification-events.json')
    ]);
    
    await bazi.loadData();
    bazi.solarTerms = solarTerms;
    qimen.config = qimenCfg;
    qimen.setSolarTerms(solarTerms);
    qimen.loaded = true;
    iching.solarTerms = solarTerms;
    iching.loaded = true;

    console.log('⚡ 速窺運勢驗證 v100 (重新整理README.md)');

    // Store engines globally for _calculateDayScore
    window.__baziEngine = bazi;
    window.__qimenEngine = qimen;
    window.__ichingEngine = iching;

    // Event-type profiles
    const eventProfiles = {
      default:{target:['正官','正印','食神','正財'],avoid:['七殺','劫財','傷官'],w:{y:1,m:.5,d:3,h:2},mult:2.5,dir:'pos'},
      inauguration:{target:['正官','七殺'],avoid:['傷官','劫財','比肩'],w:{y:2,m:1,d:6,h:4},mult:3.0,dir:'pos'},
      re_election:{target:['正官','正印','偏印'],avoid:['傷官','劫財'],w:{y:3,m:2,d:5,h:4},mult:3.0,dir:'pos'},
      gold_medal:{target:['食神','傷官'],avoid:['正印','偏印','劫財'],w:{y:1,m:1,d:5,h:6},mult:3.0,dir:'pos'},
      major_award:{target:['食神','傷官','偏財'],avoid:['正印','偏印','劫財'],w:{y:1,m:1,d:5,h:6},mult:3.5,dir:'pos'},
      ipo:{target:['正財','偏財','七殺'],avoid:['比肩','劫財','正印'],w:{y:2,m:1,d:6,h:5},mult:3.0,dir:'pos'},
      founding:{target:['偏財','七殺','比肩'],avoid:['正印','劫財'],w:{y:2,m:1,d:5,h:5},mult:3.0,dir:'pos'},
      marriage:{target:['正財','正官'],avoid:['劫財','七殺','傷官'],w:{y:2,m:1,d:5,h:5},mult:3.0,dir:'pos'},
      creative_release:{target:['食神','傷官'],avoid:['正印','偏印'],w:{y:1,m:1,d:4,h:6},mult:3.0,dir:'pos'},
      policy:{target:['正官','正印'],avoid:['傷官'],w:{y:3,m:2,d:5,h:4},mult:3.0,dir:'pos'},
      achievement:{target:['食神','傷官','偏財','正財'],avoid:['正印','偏印','劫財'],w:{y:2,m:1,d:5,h:5},mult:3.0,dir:'pos'},
      public_event:{target:['食神','傷官','正官'],avoid:['劫財'],w:{y:2,m:1,d:4,h:5},mult:3.0,dir:'pos'},
      historic_event:{target:['七殺','偏印'],avoid:[],w:{y:2,m:2,d:4,h:4},mult:3.0,dir:'pos'},
      return_home:{target:['正印','偏印'],avoid:['七殺'],w:{y:3,m:2,d:5,h:4},mult:3.0,dir:'pos'},
      milestone:{target:['正印','食神'],avoid:[],w:{y:1,m:1,d:3,h:3},mult:2.5,dir:'pos'},
      retirement_positive:{target:['正印','偏印','食神'],avoid:['七殺'],w:{y:2,m:1,d:4,h:5},mult:3.0,dir:'pos'},
      death:{target:['七殺','劫財','傷官'],avoid:['正印','偏印','比肩'],w:{y:3,m:2,d:5,h:6},mult:3.5,dir:'neg'},
      failure:{target:['七殺','劫財'],avoid:['食神','傷官','比肩'],w:{y:2,m:1,d:4,h:5},mult:3.0,dir:'neg'},
      attack:{target:['七殺','劫財'],avoid:['正印','偏印','比肩'],w:{y:2,m:1,d:5,h:5},mult:3.0,dir:'neg'},
      sanction:{target:['七殺','劫財'],avoid:['正財','偏財','正印'],w:{y:4,m:2,d:4,h:4},mult:3.0,dir:'neg'},
      retirement:{target:['正印','偏印'],avoid:['七殺'],w:{y:1,m:1,d:3,h:3},mult:1.5,dir:'neu'},
      neutral:{target:[],avoid:[],w:{y:1,m:.5,d:2,h:1},mult:1,dir:'neu'}
    };

    function classifyEvent(evt) {
      const d = evt.desc;
      if (/當選|就職|首任/.test(d)) return 'inauguration';
      if (/連任/.test(d)) return 're_election';
      if (/金牌|冠軍|金獎|首金/.test(d)) return 'gold_medal';
      if (/諾貝爾|奧斯卡|金像獎|金熊獎|金獅獎|銀熊獎|最佳導演|最佳女主角|最佳女演員|最佳男主角|大獎/.test(d)) return 'major_award';
      if (/上市/.test(d)) return 'ipo';
      if (/成立|創立/.test(d)) return 'founding';
      if (/結婚/.test(d)) return 'marriage';
      if (/發布|上映|專輯|播出|發行|出道|爆紅/.test(d)) return 'creative_release';
      if (/改革開放|講話|確立|全會/.test(d)) return 'policy';
      if (/回歸/.test(d)) return 'return_home';
      if (/奧運開幕/.test(d)) return 'public_event';
      if (/千禧年/.test(d)) return 'milestone';
      if (/開幕式|總導演|春晚/.test(d)) return 'public_event';
      if (/演說/.test(d)) return 'public_event';
      if (/事變/.test(d)) return 'historic_event';
      if (/選秀狀元/.test(d)) return 'achievement';
      if (/退役/.test(d) && evt.type === 'positive') return 'retirement_positive';
      if (/成功|配套|紀錄|創作|總決賽/.test(d)) return 'achievement';
      if (/原子彈/.test(d)) return 'achievement';
      if (/逝世/.test(d)) return 'death';
      if (/退賽|摔倒/.test(d)) return 'failure';
      if (/槍擊/.test(d)) return 'attack';
      if (/制裁|封殺|糾紛/.test(d)) return 'sanction';
      if (/逮捕|收押|被捕|入獄|判刑|定罪/.test(d)) return 'sanction';
      if (/逃稅|漏稅|罰款|被罰/.test(d)) return 'sanction';
      if (/禁賽|禁令|處罰/.test(d)) return 'sanction';
      if (/拋售|債務|危機|爆發|破產/.test(d)) return 'sanction';
      if (/抗檢|風波/.test(d)) return 'sanction';
      if (/裁員|解約|解僱/.test(d)) return 'failure';
      if (/醜聞|出軌|劈腿|外遇|涉賭|欠債/.test(d)) return 'sanction';
      if (/燒傷|失智|確診|重病/.test(d)) return 'attack';
      if (/政爭|反對|抗議/.test(d)) return 'sanction';
      if (/卸任|退役/.test(d)) return 'retirement';
      return 'default';
    }

    // Build celeb lookup
    const celebMap = {};
    celebrities.forEach(c => { celebMap[c.name] = c; });

    // Process each event
    const results = [];
    let passCount = 0, failCount = 0;
    
    for (const evt of events) {
      const celeb = celebMap[evt.name];
      if (!celeb) continue;
      
      const birthDate = new Date(celeb.birthDate + 'T12:00:00');
      const birthTime = celeb.birthTime || '12:00';
      const eventDate = new Date(evt.eventDate + 'T12:00:00');
      
      // Calculate bazi
      const baziResult = bazi.calculateBazi(birthDate, birthTime, celeb.gender);
      if (!baziResult) continue;
      
      // Classify event and score with event-type-specific engine
      // Neutral events use dedicated neutral profile (avoids push/pull)
      const subtype = evt.type === 'neutral' ? 'neutral' : classifyEvent(evt);
      const dateScore = _calculateDayScore(baziResult, eventDate, subtype, eventProfiles);
      
      // Event type threshold
      let thresholdLow = 0, thresholdHigh = 100;
      if (evt.type === 'positive') { thresholdLow = 45; }
      else if (evt.type === 'negative') { thresholdHigh = 52; }
      else { thresholdLow = 45; thresholdHigh = 60; }
      
      const passed = dateScore >= thresholdLow && dateScore <= thresholdHigh;
      if (passed) passCount++; else failCount++;
      
      results.push({
        name: evt.name,
        date: evt.eventDate,
        type: evt.type,
        subtype,
        desc: evt.desc,
        score: dateScore,
        passed,
        threshold: evt.type === 'positive' ? `≥${thresholdLow}` : evt.type === 'negative' ? `≤${thresholdHigh}` : `${thresholdLow}-${thresholdHigh}`
      });
    }
    
    const total = passCount + failCount;
    const accuracy = total > 0 ? Math.round(passCount / total * 100) : 0;
    
    // Render report
    renderReport(results, passCount, failCount, total, accuracy);
    
  } catch (e) {
    document.getElementById('content').innerHTML = `<p style="color:red">錯誤：${e.message}</p>`;
    console.error(e);
  }
}

function _calculateDayScore(baziResult, date, eventType, eventProfiles) {
  const be = window.__baziEngine;
  const hbList = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const stems = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const branches = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const bEl = b => ({'子':'water','丑':'earth','寅':'wood','卯':'wood','辰':'earth','巳':'fire','午':'fire','未':'earth','申':'metal','酉':'metal','戌':'earth','亥':'water'}[b]||'');
  const fiveEls = ['wood','fire','earth','metal','water'];
  const chongMap = {'甲':'庚','庚':'甲','乙':'辛','辛':'乙','丙':'壬','壬':'丙','丁':'癸','癸':'丁'};
  const bOp = {'子':'午','午':'子','丑':'未','未':'丑','寅':'申','申':'寅','卯':'酉','酉':'卯','辰':'戌','戌':'辰','巳':'亥','亥':'巳'};
  const tianDe = {'寅':'丁','卯':'申','辰':'壬','巳':'辛','午':'亥','未':'甲','申':'癸','酉':'寅','戌':'丙','亥':'乙','子':'巳','丑':'庚'};
  const yueDe = {'寅':'丙','午':'丙','戌':'丙','巳':'庚','酉':'庚','丑':'庚','申':'壬','子':'壬','辰':'壬','亥':'甲','卯':'甲','未':'甲'};
  const tianShe = {'寅':'戊寅','卯':'戊寅','辰':'戊寅','巳':'甲午','午':'甲午','未':'甲午','申':'戊申','酉':'戊申','戌':'戊申','亥':'甲子','子':'甲子','丑':'甲子'};

  function getTenGodElement(tgName, dmStem) {
    const dmEl = bEl(dmStem);
    const idx = fiveEls.indexOf(dmEl);
    if (['比肩','劫財'].includes(tgName)) return dmEl;
    if (['食神','傷官'].includes(tgName)) return fiveEls[(idx+1)%5];
    if (['正財','偏財'].includes(tgName)) return fiveEls[(idx+2)%5];
    if (['正官','七殺'].includes(tgName)) return fiveEls[(idx+3)%5];
    if (['正印','偏印'].includes(tgName)) return fiveEls[(idx+4)%5];
    return '';
  }

  const base = new Date(2024,0,1);
  const diff = Math.round((date.getTime() - base.getTime()) / 86400000);
  const dStem = stems[((diff % 10) + 10) % 10];
  const dBranch = branches[((diff % 12) + 12) % 12];
  const flowYear = be.calculateYearPillar(date);
  const flowMonth = be.calculateMonthPillar(date);
  const profile = eventProfiles[eventType] || eventProfiles['default'];

  const scores = [];
  for (let hi = 0; hi < 12; hi++) {
    const hb = hbList[hi];
    const hStem = stems[(([0,2,4,6,8][stems.indexOf(dStem) % 5] + hi) % 10 + 10) % 10];
    const hourTG = be.getTenGod(baziResult.day.stem, hStem);
    const dayTG = be.getTenGod(baziResult.day.stem, dStem);
    const monthTG = flowMonth ? be.getTenGod(baziResult.day.stem, flowMonth.stem) : null;
    const yearTG = flowYear ? be.getTenGod(baziResult.day.stem, flowYear.stem) : null;

    // Event-specific ten god matching
    let eventMatch = 0;
    const checks = [
      { tg: yearTG, w: profile.w.y },
      { tg: monthTG, w: profile.w.m },
      { tg: dayTG, w: profile.w.d },
      { tg: hourTG, w: profile.w.h }
    ];
    for (const c of checks) {
      if (!c.tg) continue;
      if (profile.target.includes(c.tg.name)) {
        eventMatch += c.w;
        const tgEl = getTenGodElement(c.tg.name, baziResult.day.stem);
        if (baziResult.yongShen?.yongShen === tgEl) eventMatch += c.w * 0.3;
      }
      if (profile.avoid.includes(c.tg.name)) {
        eventMatch -= c.w * 0.5;
      }
    }

    // 伏吟/反吟 with birth day pillar
    if (baziResult.day) {
      const samePillar = dStem === baziResult.day.stem && dBranch === baziResult.day.branch;
      const oppPillar = chongMap[dStem] === baziResult.day.stem && bOp[dBranch] === baziResult.day.branch;
      const chongBranch = bOp[dBranch] === baziResult.day.branch;
      if (samePillar) eventMatch += profile.dir === 'neg' ? 5 : 3;
      if (oppPillar) eventMatch += profile.dir === 'neg' ? 4 : -2;
      if (chongBranch && !oppPillar) eventMatch += profile.dir === 'neg' ? 2 : -1;
    }

    // 空亡
    if (baziResult.kongWang?.includes(dBranch)) eventMatch += profile.dir === 'neg' ? 2 : -1;

    // General goodness backup for positive events (when event match is weak)
    let backupScore = 0;
    if (profile.dir === 'pos') {
      const goodGods = ['正官','正印','食神','正財'];
      if (dayTG && goodGods.includes(dayTG.name)) backupScore += 6;
      if (hourTG && goodGods.includes(hourTG.name)) backupScore += 5;
      if (monthTG && goodGods.includes(monthTG.name)) backupScore += 2;
      if (yearTG && goodGods.includes(yearTG.name)) backupScore += 2;
    }
    backupScore = Math.max(-5, Math.min(16, backupScore));

    // Apply direction to convert match into score
    let score;
    if (profile.dir === 'neg') score = 50 - (eventMatch * profile.mult);
    else if (profile.dir === 'pos') score = 50 + (eventMatch * profile.mult * 0.7) + (backupScore * 1.5);
    else score = 50 + (eventMatch * 1.5);

    // General auspiciousness
    let ausp = 0;
    const mb = flowMonth?.branch;
    if (mb) {
      if (tianDe[mb] === dStem) ausp += 3;
      if (yueDe[mb] === dStem) ausp += 3;
      if (tianShe[mb] === (dStem+dBranch)) ausp += 3;
    }
    const dr = [dBranch, hb].filter(Boolean);
    if (dr.length >= 2) {
      try { const r = be.getBranchRelations(dr); if (r) ausp += Math.round(be._calculateBranchRelationScore(r) * 0.5); } catch(e) {}
    }
    ausp = Math.max(-10, Math.min(10, ausp));
    if (profile.dir === 'pos') ausp = Math.max(-10, Math.min(15, ausp));
    score += ausp;
    scores.push(Math.max(0, Math.min(100, Math.round(score))));
  }

  return Math.round(scores.reduce((a,b)=>a+b,0) / scores.length);
}

function renderReport(results, pass, fail, total, accuracy) {
  const container = document.getElementById('content');
  
  // Sort: pass first, then by score descending
  const sorted = [...results].sort((a,b) => b.passed - a.passed || b.score - a.score);
  
  const positiveEvents = results.filter(r => r.type === 'positive');
  const negativeEvents = results.filter(r => r.type === 'negative');
  const neutralEvents = results.filter(r => r.type === 'neutral');
  
  const posPass = positiveEvents.filter(r => r.passed).length;
  const negPass = negativeEvents.filter(r => r.passed).length;
  const neuPass = neutralEvents.filter(r => r.passed).length;
  
  // Avg scores by type
  const avgPos = positiveEvents.length > 0 ? Math.round(positiveEvents.reduce((s,r)=>s+r.score,0)/positiveEvents.length) : 0;
  const avgNeg = negativeEvents.length > 0 ? Math.round(negativeEvents.reduce((s,r)=>s+r.score,0)/negativeEvents.length) : 0;
  const avgNeu = neutralEvents.length > 0 ? Math.round(neutralEvents.reduce((s,r)=>s+r.score,0)/neutralEvents.length) : 0;
  
  container.innerHTML = `
    <div class="stats">
      <div class="stat"><span class="num green">${accuracy}%</span><span class="lbl">總體準確率</span></div>
      <div class="stat"><span class="num ${accuracy >= 65 ? 'green' : 'red'}">${pass}/${total}</span><span class="lbl">通過/總事件</span></div>
      <div class="stat"><span class="num green">${avgPos}</span><span class="lbl">吉事平均分</span></div>
      <div class="stat"><span class="num red">${avgNeg}</span><span class="lbl">凶事平均分</span></div>
      <div class="stat"><span class="num neutral">${avgNeu}</span><span class="lbl">中性事件平均分</span></div>
    </div>
    <div class="summary-detail">
      <p>✅ 吉事 ${posPass}/${positiveEvents.length} 通過（期望≥48分）</p>
      <p>✅ 凶事 ${negPass}/${negativeEvents.length} 通過（期望≤52分）</p>
      <p>✅ 中性 ${neuPass}/${neutralEvents.length} 通過（期望45-60分）</p>
      <p style="margin-top:8px;color:#8B6914;font-size:0.8rem">
        事件類型專用計分 v100：重新整理README.md，
        用神加成, 一般吉神備援, 天德月德天赦及地支關係
      </p>
    </div>
    <table>
      <thead><tr>
        <th>名人</th><th>日期</th><th>類型</th><th>子類型</th><th>事件</th><th>分數</th><th>閾值</th><th>結果</th>
      </tr></thead>
      <tbody>
        ${sorted.map(r => `
          <tr class="${r.passed ? 'pass' : 'fail'}">
            <td>${r.name}</td>
            <td>${r.date}</td>
            <td><span class="badge badge-${r.type === 'positive' ? 'pos' : r.type === 'negative' ? 'neg' : 'neu'}">${r.type === 'positive' ? '吉' : r.type === 'negative' ? '凶' : '平'}</span></td>
            <td style="font-size:0.7rem;color:#8B7355">${r.subtype||''}</td>
            <td>${r.desc}</td>
            <td class="${r.score >= 65 ? 'score-hi' : r.score < 45 ? 'score-lo' : 'score-md'}">${r.score}</td>
            <td style="font-size:0.75rem">${r.threshold}</td>
            <td>${r.passed ? '✅' : '❌'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

main();
</script>
</body>
</html>
